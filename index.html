<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#2D8B57"/>
  <title>FaR-Rmacia</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Fira+Code:wght@400;500&display=swap"/>
  <!-- Aquí iría tu CSS del source 3 -->
  <style>
    /* (Copia aquí el bloque <style> completo de tu source 3) */
    .sync-status { font-size: 10px; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    #sync-icon { transition: all 0.3s; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="btn-back" onclick="goBack()">←</button>
    <div>
      <div id="header-title">💊 FaR-Rmacia</div>
      <div id="header-sub">Gestión de medicamentos</div>
      <div class="sync-status">
        <span id="sync-icon">●</span> <span id="sync-text">Cargando...</span>
      </div>
    </div>
    <div id="header-clock"></div>
  </div>

  <div id="content">
    <!-- Pantallas (Menu, Inventario, Pedidos, Citas, Historial, Modificar, etc.) -->
    <!-- (Copia aquí los bloques <div id="screen-xxx"> de tu source 3) -->
  </div>

  <nav id="bottom-nav">
    <button class="nav-btn active" data-nav="menu" onclick="navigate('menu')"><span class="nav-icon">🏠</span>Inicio</button>
    <button class="nav-btn" data-nav="inventario" onclick="navigate('inventario')"><span class="nav-icon">📦</span>Stock</button>
    <button class="nav-btn" data-nav="pedidos" onclick="navigate('pedidos')"><span class="nav-icon">🛒</span>Pedidos</button>
    <button class="nav-btn" data-nav="citas" onclick="navigate('citas')"><span class="nav-icon">📅</span>Citas</button>
    <button class="nav-btn" data-nav="historial" onclick="navigate('historial')"><span class="nav-icon">📁</span>Historial</button>
  </nav>
</div>

<button id="fab" onclick="fabAction()">+</button>
<div id="toast"></div>

<!-- FIREBASE CONFIG (Asegúrate de poner tus claves reales aquí) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "tu-app.firebaseapp.com",
    projectId: "tu-app",
    storageBucket: "tu-app.appspot.com",
    messagingSenderId: "123",
    appId: "1:123:web:abc"
  };

  const app = initializeApp(firebaseConfig);
  window.db = getFirestore(app); // Hacemos db global para app.js
</script>

<script src="app.js"></script>
</body>
</html>
